name: Build and Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: 46.224.133.155
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            IMAGE="ghcr.io/roigit-ai/auditmypage:latest"
            CONTAINER="auditmypage"

            echo "Logging in to ghcr.io..."
            echo "${{ secrets.GH_PAT }}" | docker login ghcr.io -u RoiGit-AI --password-stdin

            echo "Pulling latest image..."
            docker pull "$IMAGE"

            echo "Stopping old container..."
            docker stop "$CONTAINER" 2>/dev/null || true
            docker rm "$CONTAINER" 2>/dev/null || true

            echo "Starting new container..."
            docker run -d \
              --name "$CONTAINER" \
              --restart unless-stopped \
              --env-file ~/.env.auditmypage \
              -p 127.0.0.1:3000:3000 \
              -v /home/openclaw/auditmypage-data:/app/data \
              "$IMAGE"

            echo "Waiting for health check..."
            sleep 5
            curl -sf http://localhost:3000/health || (echo "Health check failed!" && exit 1)
            echo "Deployment successful!"
